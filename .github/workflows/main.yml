name: 260413_AI_Assistant

on:
  schedule:
    - cron: '5 0 * * *'
    - cron: '0 4 * * *'
    - cron: '40 6 * * *'
    - cron: '30 14 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # v3에서 v4로 수정됨

      - name: Set up Python
        uses: actions/setup-python@v5  # v4에서 v5로 수정됨
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install yfinance feedparser google-generativeai requests

      - name: Run AI Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python ai_bot.py
